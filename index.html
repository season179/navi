<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'" />
  <title>Navi</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #111;
      --surface: #1a1a1a;
      --border: #222;
      --text: #eee;
      --text-muted: #666;
      --accent: #4f8cff;
      --accent-bg: rgba(79, 140, 255, 0.1);
      --sidebar-width: 220px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    html, body {
      height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
    }

    /* Shell layout */
    .shell {
      display: flex;
      height: 100vh;
    }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 20px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    .brand {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .nav {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 8px;
    }

    .nav-link {
      display: block;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.875rem;
      color: var(--text-muted);
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
    }

    .nav-link:hover {
      background: var(--accent-bg);
      color: var(--accent);
    }

    .nav-link.active {
      background: var(--accent-bg);
      color: var(--accent);
      font-weight: 600;
    }

    .sidebar-footer {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
    }

    .user-chip {
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    /* Content area */
    .content {
      flex: 1;
      padding: 32px 40px;
      overflow-y: auto;
    }

    .page h2 {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .page p {
      color: var(--text-muted);
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="dist/renderer/renderer.js"></script>
</body>
</html>
